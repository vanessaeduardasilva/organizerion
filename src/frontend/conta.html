<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Organizerion</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<main class="container">

    <!-- STATS -->
    <section class="dashboard-stats animate-up">
        <div class="stat-card">
            <span class="text-uppercase">Total do Mês</span>
            <h2 id="total-mes">R$ 0,00</h2>
            <p class="stat-sub" id="total-count">0 lançamentos</p>
        </div>
        <div class="stat-card alert">
            <span class="text-uppercase">Vencendo Hoje</span>
            <h2 id="total-vencendo">0</h2>
            <p class="stat-sub" id="vencendo-sub">tudo em dia</p>
        </div>
        <div class="stat-card">
            <span class="text-uppercase">Parcelas Ativas</span>
            <h2 id="total-sync">0</h2>
            <p class="stat-sub">em andamento</p>
        </div>
    </section>

    <!-- MÊS NAVEGAÇÃO -->
    <div class="month-nav animate-up">
        <button class="chevron-btn" onclick="changeMonth(-1)" title="Mês anterior">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <span class="month-label" id="month-label">Junho 2026</span>
        <button class="chevron-btn" onclick="changeMonth(1)" title="Próximo mês">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <div class="layout-dashboard">

        <!-- FORMULÁRIO -->
        <aside class="sidebar-form">
            <div class="card animate-up">
                <h3 class="text-uppercase">Novo Lançamento</h3>
                <form id="account-form" onsubmit="submitConta(event)">

                    <div class="input-group">
                        <label>Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Conta de luz, Netflix...">
                        <span class="field-error" id="err-descricao"></span>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label>Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" placeholder="0,00">
                            <span class="field-error" id="err-valor"></span>
                        </div>
                        <div class="input-group">
                            <label>Vencimento</label>
                            <input type="date" id="data">
                            <span class="field-error" id="err-data"></span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Modalidade</label>
                        <select id="modalidade" onchange="toggleParcelas()">
                            <option value="fixa">Fixa</option>
                            <option value="esporadica">Esporádica</option>
                            <option value="parcelada">Parcelada</option>
                        </select>
                    </div>

                    <div id="group-parcelas" class="parcela-box" style="display:none">
                        <label>Número de Parcelas</label>
                        <input type="number" id="qtd-parcelas" min="2" placeholder="Ex: 12">
                    </div>

                    <button type="submit" id="btn-registrar" class="btn-primary text-uppercase">
                        <i class="fa-solid fa-plus" style="margin-right:8px"></i>Efetivar Registro
                    </button>
                </form>
            </div>
        </aside>

        <!-- TABELA -->
        <section class="main-content">
            <div class="card animate-up">
                <div class="card-header-actions">
                    <h3 class="text-uppercase">Lançamentos</h3>
                    <div class="tab-group">
                        <button class="tab-btn active" onclick="filtrar('todas', this)">Todas</button>
                        <button class="tab-btn" onclick="filtrar('fixa', this)">Fixas</button>
                        <button class="tab-btn" onclick="filtrar('parcelada', this)">Parceladas</button>
                        <button class="tab-btn" onclick="filtrar('esporadica', this)">Esporádicas</button>
                    </div>
                </div>

                <div class="table-container" id="table-area"></div>
            </div>
        </section>

    </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
